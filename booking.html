<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Booking</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        background: linear-gradient(135deg, #667eea, #764ba2);
        height: 100vh;
    }

    /* Navbar */
    nav {
        display: flex;
        justify-content: space-between;
        padding: 20px 50px;
        color: white;
        background: rgba(0,0,0,0.2);
        backdrop-filter: blur(10px);
    }

    nav a {
        color: white;
        text-decoration: none;
        margin-left: 20px;
        transition: 0.3s;
    }

    nav a:hover {
        color: #ffd369;
    }

    /* Center Box */
    .container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 85vh;
    }

    .form-box {
        width: 380px;
        padding: 30px;
        border-radius: 15px;
        background: rgba(255,255,255,0.1);
        backdrop-filter: blur(15px);
        box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        color: white;
        animation: fadeIn 1s ease;
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 8px;
        border: none;
        outline: none;
        background: rgba(255,255,255,0.2);
        color: white;
        transition: 0.3s;
    }

    input::placeholder {
        color: #ddd;
    }

    input:focus {
        background: rgba(255,255,255,0.3);
        transform: scale(1.02);
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border-radius: 8px;
        border: none;
        background: linear-gradient(45deg, #ff7e5f, #feb47b);
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.05);
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    .success {
        text-align: center;
        color: #00ffae;
        margin-top: 15px;
        display: none;
    }

    .error {
        color: #ff6b6b;
        font-size: 14px;
        text-align: center;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>

<body>

<nav>
    <h3>🎓 College Events</h3>
    <div>
        <a href="#">Home</a>
        <a href="#">Events</a>
    </div>
</nav>

<div class="container">
    <div class="form-box">
        <h2>📅 Book Your Event</h2>

        <form id="bookingForm">
            <input type="text" id="name" placeholder="👤 Your Name">
            <input type="email" id="email" placeholder="📧 Your Email">
            <input type="text" id="event" placeholder="🎉 Event Name">
            <input type="number" id="seats" placeholder="🎟 Seats">

            <button type="submit">🚀 Book Now</button>
        </form>

        <p class="error" id="errorMsg"></p>
        <p class="success" id="successMsg">✅ Booking Successful!</p>
    </div>
</div>

<script>
window.onload = function () {
    const event = JSON.parse(localStorage.getItem("selectedEvent"));
    if (event) {
        document.getElementById("event").value = event.title;
    }
};

document.getElementById("bookingForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let event = document.getElementById("event").value.trim();
    let seats = document.getElementById("seats").value.trim();

    let errorMsg = document.getElementById("errorMsg");
    let successMsg = document.getElementById("successMsg");

    errorMsg.textContent = "";
    successMsg.style.display = "none";

    if (name === "" || email === "" || event === "" || seats === "") {
        errorMsg.textContent = "⚠️ Fill all fields!";
        return;
    }

    let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
    if (!email.match(emailPattern)) {
        errorMsg.textContent = "⚠️ Invalid email!";
        return;
    }

    if (seats <= 0) {
        errorMsg.textContent = "⚠️ Seats must be greater than 0!";
        return;
    }

    successMsg.style.display = "block";
    document.getElementById("bookingForm").reset();
});
</script>

</body>
</html>
