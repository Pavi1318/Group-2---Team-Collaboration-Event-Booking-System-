<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Details - College Event Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[url('./images/bg1.avif')] bg-cover bg-center bg-fixed bg-blend-overlay bg-gray-500 font-sans text-gray-800">

    <nav class="bg-none text-black shadow-md">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="index.html" class="text-xl font-bold tracking-wider">CampusEvents</a>
            <ul class="flex space-x-6">
                <li><a href="index.html" class="hover:text-blue-200 transition">Home</a></li>
                <li><a href="events.html" class="hover:text-blue-200 transition">Events</a></li>
                <li><a href="about.html" class="hover:text-blue-200 transition">About</a></li>
                <li><a href="login.html" class="hover:text-blue-200 transition">Login</a></li>
            </ul>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto mt-10 p-4">
        
        <a href="events.html" class="inline-block mb-6 text-black hover:text-gray-600 font-medium">
            <i class="fa-solid fa-arrow-left mr-2"></i>Back to Events
        </a>

        <div class="bg-white rounded-xl shadow-lg overflow-hidden">
            
            <div class="h-90 relative overflow-hidden bg-gray-200 flex items-center justify-center">
                <img id="event-image" src="" alt="Event Banner" class="w-full h-full object-cover">
            </div>

            <div class="p-8">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h1 id="event-title" class="text-3xl font-bold text-gray-900 mb-2">Loading Event...</h1>
                        <span class="bg-blue-100 text-black text-sm font-semibold px-3 py-1 rounded-full">Campus Event</span>
                    </div>
                    
                    <button id="favorite-btn" class="text-gray-400 hover:text-red-500 text-2xl transition duration-200" title="Add to Favorites">
                        <i class="fa-solid fa-heart"></i>
                    </button>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8 bg-gray-50 p-4 rounded-lg border border-gray-100">
                    <div class="flex items-center text-gray-700">
                        <i class="fa-regular fa-calendar text-black text-xl mr-3"></i>
                        <div>
                            <p class="text-sm text-gray-500 font-medium">Date</p>
                            <p id="event-date" class="font-semibold">--/--/----</p>
                        </div>
                    </div>
                    <div class="flex items-center text-gray-700">
                        <i class="fa-regular fa-clock text-black text-xl mr-3"></i>
                        <div>
                            <p class="text-sm text-gray-500 font-medium">Time</p>
                            <p id="event-time" class="font-semibold">--:--</p>
                        </div>
                    </div>
                    <div class="flex items-center text-gray-700">
                        <i class="fa-solid fa-location-dot text-black text-xl mr-3"></i>
                        <div>
                            <p class="text-sm text-gray-500 font-medium">Venue</p>
                            <p id="event-venue" class="font-semibold">Loading...</p>
                        </div>
                    </div>
                </div>

                <div class="mb-8">
                    <h2 class="text-xl font-bold text-gray-900 mb-3">About this Event</h2>
                    <p id="event-description" class="text-gray-600 leading-relaxed">
                        Please wait while we load the event details.
                    </p>
                </div>

                <div class="border-t border-gray-200 pt-6 flex justify-end">
                    <button id="book-now-btn" class="bg-black hover:bg-gray-700 text-white font-bold py-3 px-8 rounded-lg shadow-md transition transform hover:-translate-y-0.5">
                        Book Now
                    </button>
                </div>
            </div>
        </div>
    </main>
     <footer class="bg-white-600 text-black text-center p-4">
    © 2026 College Event Booking System
  </footer>

    <script>
        const mockEventData = [
            {
                id: 1,
                title: "AI Workshop: The Future of Tech",
                date: "October 15, 2026",
                time: "10:00 AM - 2:00 PM",
                venue: "Main Auditorium, Block C",
                description: "Join us for an immersive AI workshop where industry experts will dive into machine learning, neural networks, and the practical applications of Artificial Intelligence in today's software development landscape. Perfect for beginners and advanced programmers alike.",
                image: "images/ai.jpeg"
            },
            {
                id: 2,
                title: "Full-Stack Web Development Bootcamp",
                date: "November 2, 2026",
                time: "9:00 AM - 4:00 PM",
                venue: "Computer Lab 4, Tech Building",
                description: "A hands-on, intensive bootcamp focused on modern web design. Learn to build responsive, user-friendly interfaces using advanced HTML/CSS techniques and front-end frameworks, and connect them to robust back-end systems.",
                image: "images/web.jpeg"
            },
            {
                id: 3,
                title: "Hackathon 2026: Innovate for Tomorrow",
                date: "November 20 - November 22, 2026",
                time: "Starts at 5:00 PM (Friday)",
                venue: "Campus Innovation Hub",
                description: "Join our annual 24-hour coding marathon! Form a team, brainstorm solutions to real-world problems, and build functional prototypes. Mentors will be on-site to help with logic sequencing and debugging. Prizes await the most innovative software solutions.",
                image: "images/hack.jpeg"
            },
            {
                id: 4,
                title: "Graduate Engineering Career Seminar",
                date: "December 5, 2026",
                time: "2:00 PM - 5:00 PM",
                venue: "Seminar Hall A",
                description: "Prepare for your leap into the professional world. Industry experts and alumni will share insights on landing roles as graduate engineers, crafting the perfect 'Tell us about yourself' pitch, and navigating technical interviews.",
                image: "images/semi.jpeg"
            },
            {
                id: 5,
                title: "Annual Inter-College Dance Fest",
                date: "December 12, 2026",
                time: "6:30 PM - 10:00 PM",
                venue: "Open Air Amphitheater",
                description: "Take a break from the screen and experience an evening of incredible energy and talent. Watch solo and group performances spanning hip-hop, contemporary, and classical styles as teams compete for the championship trophy.",
                image: "images/dance.jpeg"
            },
            {
                id: 6,
                title: "Campus Unplugged: Music Night",
                date: "December 18, 2026",
                time: "7:00 PM - 11:30 PM",
                venue: "Main Campus Quad",
                description: "Unwind with live music under the stars. Featuring performances from our own campus bands, acoustic soloists, and a special guest DJ. Food trucks and refreshment stalls will be available throughout the night.",
                image: "images/music.jpeg"
            }
        ];

        // 1. Get the current event from the URL parameters (or default to ID 1)
        const urlParams = new URLSearchParams(window.location.search);
        const eventId = parseInt(urlParams.get('id')) || 1; 
        
        // Find the specific event object in the array that matches the ID
        const currentEvent = mockEventData.find(event => event.id === eventId);

        // 2. Display selected event details
        document.addEventListener("DOMContentLoaded", () => {
            if (currentEvent) {
                // Update text details
                document.getElementById("event-title").textContent = currentEvent.title;
                document.getElementById("event-date").textContent = currentEvent.date;
                document.getElementById("event-time").textContent = currentEvent.time;
                document.getElementById("event-venue").textContent = currentEvent.venue;
                document.getElementById("event-description").textContent = currentEvent.description;
                
                // Update Image details
                document.getElementById("event-image").src = currentEvent.image;
                document.getElementById("event-image").alt = currentEvent.title;
            } else {
                document.getElementById("event-title").textContent = "Event Not Found";
                document.getElementById("event-description").textContent = "Sorry, we couldn't find the details for this event.";
                document.getElementById("event-image").style.display = "none";
            }
        });

        // 3. Simple Interaction: Favorite Toggle
        const favoriteBtn = document.getElementById("favorite-btn");
        let isFavorite = false;

        favoriteBtn.addEventListener("click", () => {
            isFavorite = !isFavorite;
            if (isFavorite) {
                favoriteBtn.classList.remove("text-gray-400");
                favoriteBtn.classList.add("text-red-500", "scale-110");
            } else {
                favoriteBtn.classList.remove("text-red-500", "scale-110");
                favoriteBtn.classList.add("text-gray-400");
            }
        });

        // 4. Navigation to Booking Page
        const bookNowBtn = document.getElementById("book-now-btn");
        bookNowBtn.addEventListener("click", () => {
            if (currentEvent) {
                // Store the selected event name
                localStorage.setItem("selectedEventName", currentEvent.title);
                // Redirect to booking page
                window.location.href = "booking.html";
            }
        });
    </script>
</body>
</html>
